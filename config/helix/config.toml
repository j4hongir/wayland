theme = "gruvbox"

[keys.insert]
"A-space" = "normal_mode"
[keys.select]
"A-space" = "normal_mode"

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "block"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[keys.normal]
"A-s" = ":write"
"A-q" = ":quit"
"A-d" = ":quit!"



[editor]
color-modes = true
true-color = true
bufferline = "multiple" 

line-number = "relative" 
idle-timeout = 200     
